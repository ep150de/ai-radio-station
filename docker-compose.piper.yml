# Phase 2 — Premium Local DJ Voices (Piper)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.piper.yml up -d
#
# This gives you much more natural, high-quality voice than browser speech synthesis.

services:
  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: ai-radio-piper
    ports:
      - "5000:5000"     # HTTP synthesis (used by the radio when available)
      - "10200:10200"   # Wyoming protocol (for future HA integration etc)
    volumes:
      - ./piper-data:/data
    command: --voice en_US-lessac-high
    restart: unless-stopped

  radio:
    environment:
      - TTS_PROVIDER=piper
      - PIPER_URL=http://piper:5000
    depends_on:
      - piper
